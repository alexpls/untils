name: untils-selfhosted

services:
  server:
    image: untils:latest
    ports:
      - "3322:3322"
    env_file:
      - .env.selfhosted
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-untils}
    volumes:
      - ${DB_DATA_LOCATION:-./tmp/selfhosted_pgdata}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d postgres"]
      interval: 3s
      timeout: 3s
      retries: 20

  browser:
    image: chromedp/headless-shell:latest
    shm_size: 2G

