services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "54324:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  mailpit:
    image: axllent/mailpit
    ports:
      - 8025:8025
      - 1025:1025
  riverui:
    image: ghcr.io/riverqueue/riverui:latest
    ports:
      - 7332:8080
    environment:
      - DATABASE_URL=postgres://root:root@db:5432/untils_dev?sslmode=disable
volumes:
  pgdata: {}
