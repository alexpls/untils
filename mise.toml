[tools]
go = "1.26.0"
bun = "latest"

[settings]
env_file = '.env.dev'

[tasks."build:x86"]
depends = ["docs:generate", "lint", "test:*"]
run = "GOOS=linux GOARCH=amd64 go build -o untils_linux_amd64 ./cmd"

[tasks."format:go"]
run = "go fmt ./..."

[tasks."format:js"]
run = "bun run format"

[tasks.format]
depends = "format:*"

[tasks.lint]
depends = ["docs:generate"]
run = "golangci-lint run"

[tasks."docs:generate"]
run = "go run ./cmd/docsgen"

[tasks."testsetup:db"]
run = '''
psql "${PG_TEST_URL%/untils_test}" --echo-errors --quiet -c '\timing off' -c "drop database if exists untils_test with (force);"
psql "${PG_TEST_URL%/untils_test}" --echo-errors --quiet -c '\timing off' -c "create database untils_test;"
psql "${PG_TEST_URL}" --echo-errors --quiet -c '\timing off' -f ./internal/models/schema.sql
# Mark River migrations as applied since they're in schema.sql - TODO there must be a better way?
psql "${PG_TEST_URL}" --echo-errors --quiet -c "insert into river_migration (line, version, created_at) values ('main', 1, now()), ('main', 2, now()), ('main', 3, now()), ('main', 4, now()), ('main', 5, now()), ('main', 6, now()) on conflict do nothing;"
'''

[tasks."test:unit"]
env.TEMPL_DEV_MODE=false
depends = ["docs:generate", "testsetup:*"]
run = '''
go test ./...
'''

[tasks."test:integration"]
depends = ["docs:generate", "testsetup:*"]
run = '''
go test -tags=integration ./...
'''

[tasks."dev:env:sync"]
run = "./scripts/generate-env-dev.sh"

[tasks."dev:deps"]
run = '''
go install -tags 'pgx5' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
go install github.com/riverqueue/river/cmd/river@latest
go install github.com/a-h/templ/cmd/templ@latest
go install golang.org/x/tools/gopls@latest
curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.11.3
'''

[tasks."dev:watch:app"]
run = '''
templ generate --watch --proxy="http://localhost:${APP_PORT}" --open-browser=false \
    --proxyport="${TEMPL_PROXY_PORT}" \
    --ignore-pattern='.*_templ\\.go$' \
    --cmd './scripts/dev-watch-app.sh'
'''

[tasks."dev:watch:css"]
run = "bun run watch-css"

[tasks."dev:watch:js"]
run = "bun run watch-js"

[tasks."dev:info"]
run = '''
printf "workspace: %s\n" "${WORKSPACE_NAME}"
printf "compose project: %s\n" "${COMPOSE_PROJECT_NAME}"
printf "app url: http://localhost:%s/app\n" "${APP_PORT}"
printf "templ url: http://localhost:%s/app\n" "${TEMPL_PROXY_PORT}"
printf "db url: %s\n" "${PG_URL}"
printf "mailpit ui: http://localhost:%s\n" "${MAILPIT_PORT}"
printf "river ui: http://localhost:%s\n" "${RIVERUI_PORT}"
'''

[tasks."dev:up"]
run = '''
docker compose up -d
'''

[tasks."dev:down"]
run = '''
docker compose down
'''

[tasks.dev]
run = { task = "dev:watch:*" }

[tasks."db:reset"]
run = [
    { task = "db:drop" },
    { task = "db:create" },
    { task = "db:migrate:up" },
    { task = "db:seed" },
    { task = "sqlc:generate" },
]

[tasks."db:create"]
run = '''
psql "${PG_URL%/untils_dev}" -c "create database untils_dev;" || true
psql "${PG_TEST_URL%/untils_test}" -c "create database untils_test;" || true
'''

[tasks."db:drop"]
run = '''
psql "${PG_URL%/untils_dev}" -c "drop database untils_dev;" || true
psql "${PG_TEST_URL%/untils_test}" -c "drop database untils_test;" || true
'''

[tasks."db:seed"]
run = '''
ENV=dev go run ./cmd seed
'''

[tasks."db:migrate:create"]
usage = '''
arg "<name>" help="migration name"
'''
run = '''
migrate create -ext sql -dir internal/db/migrations "${usage_name?}"
'''

[tasks."db:migrate:up"]
depends_post = ["db:dump_schema"]
run = '''
migrate -database ${PG_URL/postgresql/pgx5} -path internal/db/migrations up
migrate -database ${PG_TEST_URL/postgresql/pgx5} -path internal/db/migrations up
river migrate-up --database-url "${PG_URL}"
river migrate-up --database-url "${PG_TEST_URL}"
'''

[tasks."db:migrate:down"]
depends_post = ["db:dump_schema"]
run = '''
migrate -database ${PG_URL/postgresql/pgx5} -path internal/db/migrations down 1
migrate -database ${PG_TEST_URL/postgresql/pgx5} -path internal/db/migrations down 1
'''

[tasks."db:dump_schema"]
run = '''
# stripping restrict tags because sqlc balks when processing them. remove once: https://github.com/sqlc-dev/sqlc/issues/4065 is fixed
pg_dump "$PG_URL" --schema-only --no-owner --no-privileges --restrict-key stable \
    | sed '/^\\restrict /d;/^\\unrestrict /d' \
    > internal/models/schema.sql
'''

[tasks."sqlc:generate"]
depends = ["db:dump_schema"]
run = "cd internal/models && sqlc generate"
