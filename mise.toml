[tools]
go = "1.26.0"
bun = "latest"

[env]
_.file = ".env.dev"

[tasks."build:x86"]
depends = ["generate", "lint", "test:*"]
run = "GOOS=linux GOARCH=amd64 go build -o untils_linux_amd64 ./cmd"

[tasks."format:go"]
run = "go fmt ./..."

[tasks."format:js"]
run = "bun run format"

[tasks.format]
depends = "format:*"

[tasks.lint]
depends = ["generate"]
run = "golangci-lint run"

[tasks.generate]
depends = ["openapi:generate"]

[tasks."testsetup:db"]
env = { _.file = ".env.test" }
run = '''
db_name="${PG_URL##*/}"
db_base_url="${PG_URL%/${db_name}}"

psql "${db_base_url}" --echo-errors --quiet -c "drop database if exists ${db_name} with (force);"
psql "${db_base_url}" --echo-errors --quiet -c "create database ${db_name};"
psql "${PG_URL}" --echo-errors --quiet -f ./internal/models/schema.sql
'''

[tasks."test:unit"]
env = { _.file = ".env.test", TEMPL_DEV_MODE = "false" }
depends = ["generate", "testsetup:*"]
run = "go test ./..."

[tasks."test:integration"]
env = { _.file = ".env.test" }
depends = ["generate", "testsetup:*"]
run = "go test -tags=integration ./..."

[tasks."dev:env:sync"]
run = "./scripts/generate-env-dev.sh"

[tasks."dev:deps"]
run = '''
go install -tags 'pgx5' github.com/golang-migrate/migrate/v4/cmd/migrate@v4.19.1
go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1
go install github.com/riverqueue/river/cmd/river@v0.35.1
go install github.com/a-h/templ/cmd/templ@v0.3.1020
go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.5.0
go install golang.org/x/tools/gopls@latest
curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.11.3
'''

[tasks."openapi:generate"]
run = "oapi-codegen -config internal/apimessage/oapi-codegen.yml docs/public/openapi.yml"

[tasks."dev:watch:app"]
run = '''
templ generate --watch --watch-pattern '(.+\.go$)|(.+\.templ$)|(.+\.md)' \
    --proxy="http://localhost:${APP_PORT}" --open-browser=false \
    --proxyport="${TEMPL_PROXY_PORT}" \
    --ignore-pattern='.*_templ\\.go$' \
    --cmd './scripts/dev-watch-app.sh'
'''

[tasks."dev:watch:css"]
run = "bun run watch-css"

[tasks."dev:watch:js"]
run = "bun run watch-js"

[tasks."dev:info"]
run = '''
printf "workspace: %s\n" "${WORKSPACE_NAME}"
printf "compose project: %s\n" "${COMPOSE_PROJECT_NAME}"
printf "app url: http://localhost:%s/app\n" "${APP_PORT}"
printf "templ url: http://localhost:%s/app\n" "${TEMPL_PROXY_PORT}"
printf "db url: %s\n" "${PG_URL}"
printf "mailpit ui: http://localhost:%s\n" "${MAILPIT_PORT}"
printf "river ui: http://localhost:%s\n" "${RIVERUI_PORT}"
'''

[tasks."dev:up"]
run = '''
docker compose up -d
'''

[tasks."dev:down"]
run = '''
docker compose down
'''

[tasks.dev]
depends = ["dev:watch:app", "dev:watch:css", "dev:watch:js"]

[tasks."db:reset"]
run = [
  { task = "db:drop" },
  { task = "db:create" },
  { task = "db:migrate:up" },
  { task = "db:seed" },
  { task = "sqlc:generate" },
]

[tasks."db:create"]
run = '''
db_name="${PG_URL##*/}"
psql "${PG_URL%/${db_name}}" -c "create database ${db_name};" || true
'''

[tasks."db:drop"]
run = '''
db_name="${PG_URL##*/}"
psql "${PG_URL%/${db_name}}" -c "drop database ${db_name};" || true
'''

[tasks."db:seed"]
run = 'go run ./cmd seed'

[tasks."db:migrate:create"]
usage = '''
arg "<name>" help="migration name"
'''
run = '''
migrate create -ext sql -dir internal/db/migrations "${usage_name?}"
'''

[tasks."db:migrate:up"]
depends_post = ["db:dump_schema"]
run = '''
pgx_url="$(printf '%s\n' "$PG_URL" | sed -e 's,^postgresql:,pgx5:,' -e 's,^postgres:,pgx5:,')"
migrate -database "$pgx_url" -path internal/db/migrations up
river migrate-up --database-url "${PG_URL}"
'''

[tasks."db:migrate:down"]
depends_post = ["db:dump_schema"]
run = '''
pgx_url="$(printf '%s\n' "$PG_URL" | sed -e 's,^postgresql:,pgx5:,' -e 's,^postgres:,pgx5:,')"
migrate -database "$pgx_url" -path internal/db/migrations down 1
'''

[tasks."db:dump_schema"]
run = '''
# stripping restrict tags because sqlc balks when processing them. remove once: https://github.com/sqlc-dev/sqlc/issues/4065 is fixed
pg_dump "$PG_URL" --schema-only --no-owner --no-privileges --restrict-key stable \
    | sed '/^\\restrict /d;/^\\unrestrict /d' \
    > internal/models/schema.sql
'''

[tasks."sqlc:generate"]
depends = ["db:dump_schema"]
run = "cd internal/models && sqlc generate"
