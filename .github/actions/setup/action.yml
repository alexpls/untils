name: setup

description: install mise tools, cache deps, and build css/js

runs:
  using: composite
  steps:
    - uses: jdx/mise-action@v3
      with:
        install_args: go bun
        cache: true

    - uses: actions/cache@v5
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - uses: actions/cache@v5
      with:
        path: node_modules
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - run: |
        go mod download
        go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.5.0
      shell: bash

    - run: bun install
      shell: bash

    - run: bun run build-css
      shell: bash

    - run: bun run build-js
      shell: bash
